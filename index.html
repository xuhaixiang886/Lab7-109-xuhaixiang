<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>美丽烟台理工校园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            padding-bottom: 70px;
        }

        /* 标题 */
        .header {
            text-align: center;
            padding: 30px 0;
            font-size: 32px;
            color: #0066cc;
            font-weight: bold;
        }

        /* 总九宫格容器 */
        .container {
            width: 1000px;
            margin: 0 auto;
        }

        
        .theme1 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            position: relative; /* 父相：相对定位 */
        }
        .theme1 h2 {
            grid-column: 1 / -1;
            text-align: center;
            color: #0066cc;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .theme1 .box {
            height: 200px;
            background: #e6f2ff;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .theme1 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
            position: absolute; /* 子绝：绝对定位 */
            top: 0;
            left: 0;
        }

        /* 第一行特效：图片放大1.5倍 / 标题旋转45° */
        .theme1 .box:hover img {
            transform: scale(1.5);
        }
        .theme1 h2:hover {
            transform: rotate(45deg);
            transition: 0.4s;
        }

       
        .theme2 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .theme2 h2 {
            grid-column: 1 / -1;
            text-align: center;
            color: #009966;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .theme2 .box {
            height: 200px;
            background: #f0fff4;
            border-radius: 8px;
            overflow: hidden;
        }
        .theme2 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        /* 第二行特效：图片倾斜30° */
        .theme2 .box:hover img {
            transform: skew(30deg);
        }

      
        .theme3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
        }
        .theme3 h2 {
            grid-column: 1 / -1;
            text-align: center;
            color: #cc6600;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .theme3 .box {
            height: 200px;
            background: #fff9e6;
            border-radius: 8px;
            overflow: hidden;
        }
        .theme3 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #0066cc;
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <h1 class="header">美丽烟台理工校园</h1>

    <div class="container">
        <!-- 第一行：主题一（整行一个主题） -->
        <div class="theme1">
            <h2>主题一：校园教学区</h2>
            <div class="box"><img src="images/jiaoxue1.jpg" alt="校园"></div>
            <div class="box"><img src="images/jiaoxue2.jpg" alt="校园"></div>
            <div class="box"><img src="images/jiaoxue3.jpg" alt="校园"></div>
        </div>

        <!-- 第二行：主题二（整行一个主题） -->
        <div class="theme2">
            <h2>主题二：校园生活区</h2>
            <div class="box"><img src="images/xiaoyuan1.jpg" alt="校园"></div>
            <div class="box"><img src="images/xiaoyuan2.jpg" alt="校园"></div>
            <div class="box"><img src="images/xiaoyuan3.jpg" alt="校园"></div>
        </div>

        <!-- 第三行：主题三（整行一个主题） -->
        <div class="theme3">
            <h2>主题三：校园景观区</h2>
            <div class="box"><img src="images/jingguan1.jpg" alt="校园"></div>
            <div class="box"><img src="images/jingguan2.jpg" alt="校园"></div>
            <div class="box"><img src="images/jingguan3.jpg" alt="校园"></div>
        </div>
    </div>

    <!-- 固定页脚 -->
    <footer>烟台理工学院 © 校园风采展示</footer>
</body>
</html>
